<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
overflow:hidden;
background:black;
}

canvas{
display:block;
background:linear-gradient(to bottom,#050816,#000);
}

/* TOP UI */

#topBar{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:12px;
z-index:20;
pointer-events:none;
}

.stat{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(10px);
padding:10px 18px;
border-radius:16px;
font-weight:bold;
font-size:17px;
box-shadow:0 0 20px rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.08);
color:white;
}

/* MENU */

#menu{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:30;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(14px);
padding:40px;
border-radius:28px;
width:320px;
box-shadow:0 0 40px rgba(0,255,255,0.2);
animation:menuAnim 0.7s ease;
}

#menu h1{
font-size:42px;
margin-bottom:14px;
color:white;
animation:glow 2s infinite alternate;
}

#menu p{
color:#ddd;
margin-top:8px;
font-size:16px;
}

button{
margin-top:18px;
padding:14px 30px;
border:none;
border-radius:15px;
font-size:18px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(45deg,#00ffe5,#00aaff);
color:black;
transition:0.25s;
box-shadow:0 0 25px rgba(0,255,255,0.5);
}

button:hover{
transform:scale(1.08);
}

/* COUNTDOWN */

#countdown{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
font-weight:bold;
color:white;
z-index:100;
display:none;
animation:zoom 1s ease;
text-shadow:
0 0 20px #00ffe5,
0 0 50px #00ffe5;
}

/* COOL CREDIT */

#credits{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
font-size:20px;
font-weight:bold;
color:white;
letter-spacing:2px;
z-index:50;
text-transform:uppercase;
animation:creditGlow 2s infinite alternate;
text-shadow:
0 0 10px white,
0 0 20px #00ffe5,
0 0 40px #00ffe5;
}

/* ANIMATIONS */

@keyframes glow{

from{
text-shadow:0 0 10px #00ffe5;
}

to{
text-shadow:
0 0 20px #00ffe5,
0 0 50px #00ffe5;
}

}

@keyframes creditGlow{

from{
opacity:0.8;
transform:translateX(-50%) scale(1);
}

to{
opacity:1;
transform:translateX(-50%) scale(1.05);
}

}

@keyframes menuAnim{

from{
opacity:0;
transform:translate(-50%,-50%) scale(0.7);
}

to{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}

}

@keyframes zoom{

from{
transform:translate(-50%,-50%) scale(0.3);
opacity:0;
}

to{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}

}

<body>

<div id="topBar">

<div class="stat" id="score">
Score: 0
</div>

<div class="stat" id="best">
Best: 0
</div>

<div class="stat" id="coins">
Coins: 0
</div>

<div class="stat" id="rank">
Beginner
</div>

</div>

<div id="menu">

<h1>🌑 SHADOW SHIFT X</h1>

<p>Press SPACE or TAP</p>

<p>Switch dimensions to survive.</p>

<button onclick="startCountdown()">
PLAY
</button>

</div>

<div id="countdown">3</div>

<canvas id="game"></canvas>

<div id="credits">
@Ved Games Production
</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

/* SOUND */

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playBeep(freq,duration){

let osc = audioCtx.createOscillator();
let gain = audioCtx.createGain();

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.frequency.value = freq;
osc.type = "sine";

osc.start();

gain.gain.setValueAtTime(0.1,audioCtx.currentTime);

gain.gain.exponentialRampToValueAtTime(
0.0001,
audioCtx.currentTime + duration
);

osc.stop(audioCtx.currentTime + duration);

}

function playMusic(){

setInterval(()=>{

if(gameRunning){

playBeep(220,0.2);

setTimeout(()=>playBeep(330,0.2),200);

setTimeout(()=>playBeep(440,0.2),400);

}

},800);

}

/* GAME */

let gameRunning = false;

let player = {

x:150,
y:300,
size:20,
vy:0,
gravity:0.6,
jump:-10,
mode:"real",
color:"#00d4ff"

};

let obstacles = [];
let particles = [];

let score = 0;
let best = localStorage.getItem("best") || 0;
let coins = parseInt(localStorage.getItem("coins")) || 0;

let speed = 6;
let frame = 0;

document.getElementById("best").innerText =
"Best: " + best;

document.getElementById("coins").innerText =
"Coins: " + coins;

/* COUNTDOWN */

function startCountdown(){

document.getElementById("menu").style.display =
"none";

let count = 3;

let countdown =
document.getElementById("countdown");

countdown.style.display = "block";

countdown.innerText = count;

let timer = setInterval(()=>{

count--;

if(count > 0){

countdown.innerText = count;

playBeep(500,0.2);

}else if(count === 0){

countdown.innerText = "GO!";

playBeep(800,0.4);

}else{

clearInterval(timer);

countdown.style.display = "none";

startGame();

}

},1000);

}

function startGame(){

score = 0;
speed = 6;
frame = 0;

player.y = 300;
player.vy = 0;

obstacles = [];
particles = [];

gameRunning = true;

playMusic();

loop();

}

function spawnObstacle(){

let type =
Math.random() > 0.5
? "real"
: "shadow";

let gap = 170;

let topHeight =
Math.random() * (canvas.height - 320) + 50;

obstacles.push({

x:canvas.width,
top:topHeight,
bottom:canvas.height - topHeight - gap,
type:type,
passed:false

});

}

function drawPlayer(){

ctx.beginPath();

ctx.fillStyle = player.color;

ctx.shadowColor = player.color;

ctx.shadowBlur = 25;

ctx.arc(
player.x,
player.y,
player.size,
0,
Math.PI * 2
);

ctx.fill();

ctx.shadowBlur = 0;

}

function drawObstacle(obs){

ctx.fillStyle =
obs.type === "real"
? "#00d4ff"
: "#d000ff";

ctx.fillRect(obs.x,0,70,obs.top);

ctx.fillRect(
obs.x,
canvas.height - obs.bottom,
70,
obs.bottom
);

}

function createParticles(){

for(let i=0;i<8;i++){

particles.push({

x:player.x,
y:player.y,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:25,
size:3

});

}

}

function updateParticles(){

for(let p of particles){

p.x += p.vx;
p.y += p.vy;
p.life--;

ctx.fillStyle = player.color;

ctx.fillRect(
p.x,
p.y,
p.size,
p.size
);

}

particles =
particles.filter(p=>p.life > 0);

}

function update(){

frame++;

player.vy += player.gravity;

player.y += player.vy;

if(frame % 90 === 0){

spawnObstacle();

}

for(let obs of obstacles){

obs.x -= speed;

drawObstacle(obs);

if(

player.x + player.size > obs.x &&

player.x - player.size < obs.x + 70

){

if(player.mode === obs.type){

if(

player.y - player.size < obs.top ||

player.y + player.size >
canvas.height - obs.bottom

){

gameOver();

}

}

}

if(!obs.passed && obs.x < player.x){

obs.passed = true;

score++;

coins += 1;

localStorage.setItem("coins",coins);

document.getElementById("score").innerText =
"Score: " + score;

document.getElementById("coins").innerText =
"Coins: " + coins;

if(score > best){

best = score;

localStorage.setItem("best",best);

document.getElementById("best").innerText =
"Best: " + best;

}

if(score > 10){

document.getElementById("rank").innerText =
"Pro Gamer";

}

if(score > 25){

document.getElementById("rank").innerText =
"Shadow Master";

}

if(score > 50){

document.getElementById("rank").innerText =
"Dimension God";

}

if(score % 5 === 0){

speed += 0.5;

}

}

}

obstacles =
obstacles.filter(o=>o.x > -100);

if(player.y > canvas.height ||
player.y < 0){

gameOver();

}

}

function gameOver(){

gameRunning = false;

createParticles();

document.getElementById("menu").style.display =
"block";

document.querySelector("#menu h1").innerHTML =
"💀 GAME OVER";

}

function drawBackground(){

for(let i=0;i<60;i++){

ctx.fillStyle =
"rgba(255,255,255,0.07)";

ctx.beginPath();

ctx.arc(

(i*90 + frame*0.4)%canvas.width,

(i*50)%canvas.height,

2,

0,

Math.PI*2

);

ctx.fill();

}

}

function loop(){

if(!gameRunning) return;

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

drawBackground();

update();

updateParticles();

drawPlayer();

requestAnimationFrame(loop);

}

function switchMode(){

player.mode =
player.mode === "real"
? "shadow"
: "real";

player.vy = player.jump;

player.color =
player.mode === "real"
? "#00d4ff"
: "#d000ff";

createParticles();

playBeep(700,0.08);

}

window.addEventListener("keydown",e=>{

if(e.code === "Space"){

e.preventDefault();

switchMode();

}

});

window.addEventListener("touchstart",()=>{

switchMode();

});

</script>
