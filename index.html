<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="google-site-verification" content="lWj1SJEMwzx8-Du4kVNx6Q-MwCpx8_rDB4k-ImuEpmU" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Shift X - Ved Games Production</title>

<meta name="description" content="Play Shadow Shift X - Neon dimension shifting arcade game.">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{overflow:hidden;background:black;}
canvas{display:block;background:linear-gradient(to bottom,#050816,#000);}

/* TOP UI */
#topBar{
position:absolute;top:15px;left:50%;transform:translateX(-50%);
display:flex;gap:10px;z-index:20;pointer-events:none;flex-wrap:wrap;
}
.stat{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(10px);
padding:8px 14px;border-radius:14px;
font-weight:bold;color:white;
}

/* MENU */
#menu{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
text-align:center;z-index:30;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(14px);
padding:30px;border-radius:20px;width:320px;
color:white;
}

button{
margin-top:15px;padding:12px 25px;
border:none;border-radius:12px;
font-weight:bold;cursor:pointer;
background:linear-gradient(45deg,#00ffe5,#00aaff);
}

/* COUNTDOWN */
#countdown{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
font-size:90px;font-weight:bold;
color:white;display:none;z-index:100;
}

/* MOBILE CONTROLS */
#mobileControls{
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:15px;
z-index:100;
}

.controlBtn{
padding:12px 18px;
border-radius:14px;
border:none;
font-weight:bold;
background:rgba(255,255,255,0.1);
color:white;
backdrop-filter:blur(10px);
}

.controlBtn:active{transform:scale(0.9);}
</style>
</head>

<body>

<div id="topBar">
<div class="stat" id="score">Score: 0</div>
<div class="stat" id="best">Best: 0</div>
<div class="stat" id="coins">Coins: 0</div>
<div class="stat" id="rank">Beginner</div>
</div>

<div id="menu">
<h1>🌑 SHADOW SHIFT X</h1>
<p>SPACE/TAP = Switch</p>
<p>SHIFT = Dash | S = Shield</p>
<button onclick="startCountdown()">PLAY</button>
</div>

<div id="countdown">3</div>

<!-- MOBILE BUTTONS -->
<div id="mobileControls">
<button class="controlBtn" onclick="switchMode()">⚡ SWITCH</button>
<button class="controlBtn" onclick="activateDash()">💨 DASH</button>
<button class="controlBtn" onclick="activateShield()">🛡 SHIELD</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

/* GAME STATE */
let gameRunning=false;

let player={
x:150,y:300,size:18,vy:0,
gravity:0.6,jump:-10,
mode:"real",
color:"#00d4ff"
};

let obstacles=[];
let particles=[];
let score=0;
let best=localStorage.getItem("best")||0;
let coins=parseInt(localStorage.getItem("coins"))||0;

let speed=6;
let frame=0;

/* NEW SYSTEM */
let dimensions=["real","shadow"];
let abilitiesUnlocked=false;
let shieldActive=false;

/* UI */
document.getElementById("best").innerText="Best: "+best;
document.getElementById("coins").innerText="Coins: "+coins;

/* NEW DIMENSION AFTER 10 SEC */
setInterval(()=>{
if(!gameRunning) return;
if(score>=10 && !dimensions.includes("void")){
dimensions.push("void");
}
},10000);

/* ABILITIES */
function activateDash(){
if(!abilitiesUnlocked) return;
speed+=4;
setTimeout(()=>speed-=4,2000);
}

function activateShield(){
if(!abilitiesUnlocked) return;
shieldActive=true;
player.color="#ffff00";
setTimeout(()=>{
shieldActive=false;
player.color="#00d4ff";
},3000);
}

/* START */
function startCountdown(){
document.getElementById("menu").style.display="none";
let c=3;
let cd=document.getElementById("countdown");
cd.style.display="block";
cd.innerText=c;

let t=setInterval(()=>{
c--;
if(c>0) cd.innerText=c;
else if(c===0) cd.innerText="GO!";
else{
clearInterval(t);
cd.style.display="none";
startGame();
}
},1000);
}

function startGame(){
gameRunning=true;
score=0;
speed=6;
frame=0;
player.y=300;
player.vy=0;
obstacles=[];
loop();
}

/* OBSTACLES */
function spawnObstacle(){
let type=dimensions[Math.floor(Math.random()*dimensions.length)];
let gap=170;
let top=Math.random()*(canvas.height-300)+50;

obstacles.push({
x:canvas.width,
top:top,
bottom:canvas.height-top-gap,
type:type,
passed:false
});
}

function drawPlayer(){
ctx.beginPath();
ctx.fillStyle=player.color;
ctx.arc(player.x,player.y,player.size,0,Math.PI*2);
ctx.fill();
}

function drawObstacle(o){
ctx.fillStyle=o.type==="real"?"#00d4ff":o.type==="shadow"?"#d000ff":"#ff5500";
ctx.fillRect(o.x,0,60,o.top);
ctx.fillRect(o.x,canvas.height-o.bottom,60,o.bottom);
}

function update(){
frame++;

player.vy+=player.gravity;
player.y+=player.vy;

if(frame%90===0) spawnObstacle();

for(let o of obstacles){
o.x-=speed;
drawObstacle(o);

/* SCORE */
if(!o.passed && o.x<player.x){
o.passed=true;
score++;
coins++;
localStorage.setItem("coins",coins);

if(score>=5) abilitiesUnlocked=true;

document.getElementById("score").innerText="Score: "+score;
document.getElementById("coins").innerText="Coins: "+coins;

if(score>best){
best=score;
localStorage.setItem("best",best);
document.getElementById("best").innerText="Best: "+best;
}

if(score>10) document.getElementById("rank").innerText="Pro Gamer";
if(score>25) document.getElementById("rank").innerText="Shadow Master";
if(score>50) document.getElementById("rank").innerText="Dimension God";
}

/* COLLISION */
if(player.x>o.x && player.x<o.x+60){
if(player.y<o.top || player.y>canvas.height-o.bottom){
if(!shieldActive) gameOver();
}
}
}

obstacles=obstacles.filter(o=>o.x>-100);
if(player.y>canvas.height||player.y<0) gameOver();
}

/* GAME OVER */
function gameOver(){
gameRunning=false;
document.getElementById("menu").style.display="block";
document.querySelector("#menu h1").innerText="💀 GAME OVER";
}

/* LOOP */
function loop(){
if(!gameRunning) return;
ctx.clearRect(0,0,canvas.width,canvas.height);
update();
drawPlayer();
requestAnimationFrame(loop);
}

/* SWITCH MODE */
function switchMode(){
if(player.mode==="real"){
player.mode="shadow";
player.color="#d000ff";
}else if(player.mode==="shadow"){
if(dimensions.includes("void")){
player.mode="void";
player.color="#ff5500";
}else{
player.mode="real";
player.color="#00d4ff";
}
}else{
player.mode="real";
player.color="#00d4ff";
}
player.vy=player.jump;
}

/* CONTROLS */
window.addEventListener("keydown",e=>{
if(e.code==="Space"){
switchMode();
}
if(e.code==="ShiftLeft") activateDash();
if(e.code==="KeyS") activateShield();
});

window.addEventListener("touchstart",switchMode);

window.addEventListener("resize",()=>{
canvas.width=innerWidth;
canvas.height=innerHeight;
});
</script>

</body>
</html>
